name: Sync develop with main

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use a PAT so the push to `develop` is authenticated as a ruleset
          # bypass actor. The default GITHUB_TOKEN (github-actions[bot]) is NOT
          # in the develop ruleset bypass list, so its direct push is rejected
          # ("Changes must be made through a pull request"). SYNC_PAT must belong
          # to an account/role listed under Settings → Rules → develop → Bypass.
          # Falls back to GITHUB_TOKEN if the secret is unset (will still be
          # blocked by the ruleset, but the workflow stays valid).
          token: ${{ secrets.SYNC_PAT || secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync develop with main
        run: |
          set -euo pipefail
          git fetch origin main

          # `develop` may have been auto-deleted: it is the head branch of the
          # develop→main release PR, and the repo has "delete branch on merge"
          # enabled. The old `git fetch origin main develop` died here with
          # "couldn't find remote ref develop". Recreate it from main when it is
          # missing; otherwise merge main into it (preserving any divergence).
          if git ls-remote --exit-code --heads origin develop >/dev/null 2>&1; then
            git fetch origin develop
            git checkout -B develop origin/develop
            git merge --no-edit origin/main
          else
            echo "develop is missing (auto-deleted as the release PR head) — recreating from main."
            git checkout -B develop origin/main
          fi

          # Idempotent: a no-op push prints "Everything up-to-date" and exits 0.
          git push origin develop
          echo "✅ develop synced with main"
